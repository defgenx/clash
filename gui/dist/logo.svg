<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 200" fill="none">
  <!-- clash header lockup — debossed into the sidebar surface. -->
  <defs>
    <filter id="deboss" x="-30%" y="-30%" width="160%" height="160%">
      <feOffset in="SourceAlpha" dx="0" dy="5" result="off"/>
      <feGaussianBlur in="off" stdDeviation="5" result="blur"/>
      <feComposite in="blur" in2="SourceAlpha" operator="arithmetic" k2="-1" k3="1" result="mask"/>
      <feFlood flood-color="#000000" flood-opacity="0.6"/>
      <feComposite in2="mask" operator="in" result="shadow"/>
      <feMerge>
        <feMergeNode in="SourceGraphic"/>
        <feMergeNode in="shadow"/>
      </feMerge>
    </filter>
    <filter id="glint" x="-150%" y="-150%" width="400%" height="400%">
      <feGaussianBlur stdDeviation="4"/>
    </filter>
  </defs>
  <g transform="translate(10, 14) scale(0.34)">
    <g transform="translate(0, 2.5)">
      <circle cx="250" cy="246" r="118" fill="none" stroke="rgba(255,255,255,0.09)" stroke-width="5"/>
      <path d="M 170 166 L 250 246 L 170 326" fill="none" stroke="rgba(255,255,255,0.09)" stroke-width="40"
            stroke-linecap="round" stroke-linejoin="round"/>
      <rect x="290" y="306" width="78" height="22" rx="8" fill="rgba(255,255,255,0.09)"/>
    </g>
    <g filter="url(#deboss)">
      <circle cx="250" cy="246" r="118" fill="none" stroke="#101013" stroke-width="5"/>
      <path d="M 170 166 L 250 246 L 170 326" fill="none" stroke="#101013" stroke-width="40"
            stroke-linecap="round" stroke-linejoin="round"/>
      <rect x="290" y="306" width="78" height="22" rx="8" fill="#101013"/>
    </g>
    <circle cx="250" cy="246" r="9" fill="#ffffff" opacity="0.12" filter="url(#glint)"/>
    <circle cx="250" cy="246" r="3.5" fill="#ffffff" opacity="0.25"/>
  </g>
  <g font-family="ui-monospace, 'SF Mono', Menlo, monospace" font-size="108" font-weight="700">
    <text x="190" y="139" fill="rgba(255,255,255,0.09)" transform="translate(0, 2.5)">clash</text>
    <text x="190" y="139" fill="#101013" filter="url(#deboss)">clash</text>
  </g>
</svg>
