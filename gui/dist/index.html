<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>clash</title>
  <link rel="stylesheet" href="vendor/xterm.css" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div id="app">
    <aside id="sidebar">
      <div id="sidebar-header">
        <img class="logo" src="logo.svg" alt="clash" />
        <span class="badge">GUI</span>
        <span class="spacer"></span>
      </div>
      <div id="workspace-bar">
        <div id="workspace-chips"></div>
        <button id="new-ws-btn" class="icon-btn mini" title="New workspace (⌘N)">+</button>
      </div>
      <button id="new-session-btn" class="primary-action" title="Start a new Claude Code session (⌘T)">＋ New session</button>
      <div id="search-wrap">
        <input id="search" type="text" placeholder="Search sessions…  ( / )" autocomplete="off" spellcheck="false" />
      </div>
      <div id="session-list"></div>
      <div id="teams-section">
        <div class="section-label collapsible" id="teams-toggle">TEAMS <span id="teams-caret">▸</span>
          <button id="new-team-btn" class="icon-btn mini" title="New team">+</button>
        </div>
        <div id="teams-list" class="hidden"></div>
      </div>
      <div id="sidebar-footer">
        <div class="section-label">SETTINGS</div>
        <label class="setting-row">Default directory
          <input id="default-cwd" type="text" placeholder="/Users/you" autocomplete="off" spellcheck="false" />
        </label>
        <button id="update-btn" class="update-big" title="Download and install the latest clash version">⟳ Update clash</button>
        <div class="footer-row">
          <span id="session-count"></span>
          <span class="spacer"></span>
          <span id="version"></span>
        </div>
      </div>
    </aside>

    <div class="panel-resizer" id="sidebar-resizer" title="Drag to resize"></div>

    <main id="main">
      <div id="topbar">
        <div id="tabs"></div>
        <div id="topbar-actions">
          <button id="stash-all-btn" class="icon-btn wide" title="Stash all running sessions">⏸ all</button>
          <button id="split-btn" class="icon-btn" title="Add split pane (⌘D)">◫</button>
          <button id="unsplit-btn" class="icon-btn" title="Remove split pane">◻</button>
          <button id="details-btn" class="icon-btn" title="Toggle details panel">ⓘ</button>
        </div>
      </div>
      <div id="content">
        <div id="terminal-host" class="layout-1">
          <div id="empty-state">
            <div class="empty-logo">⌘</div>
            <p>Select a session to attach</p>
            <p class="hint">/ search · ⌘T new session · ⌘D split · ⌘N workspace · ⌘1-9 switch</p>
          </div>
        </div>
        <div class="panel-resizer hidden" id="browser-resizer" title="Drag to resize"></div>
        <div id="browser" class="hidden">
          <div id="browser-bar">
            <button id="b-back" class="icon-btn" title="Back">←</button>
            <button id="b-fwd" class="icon-btn" title="Forward">→</button>
            <button id="b-reload" class="icon-btn" title="Reload">⟳</button>
            <input id="b-url" type="text" spellcheck="false" autocomplete="off" placeholder="https://…" />
            <button id="b-ext" class="icon-btn" title="Open in system browser">⧉</button>
            <button id="b-close" class="icon-btn" title="Close browser panel">×</button>
          </div>
          <div id="browser-slot"></div>
        </div>
        <div class="panel-resizer hidden" id="details-resizer" title="Drag to resize"></div>
        <div id="details" class="hidden">
          <div id="details-body"></div>
        </div>
      </div>
    </main>
  </div>

  <!-- New session modal -->
  <div id="modal-backdrop" class="hidden">
    <div id="new-session-modal">
      <h3>New session</h3>
      <label>Working directory <input id="ns-cwd" type="text" placeholder="/Users/you/project" autocomplete="off" spellcheck="false" /></label>
      <label id="ns-preset-wrap" class="hidden">Preset
        <select id="ns-preset"><option value="">— none —</option></select>
      </label>
      <label>Name <input id="ns-name" type="text" placeholder="my-feature" autocomplete="off" spellcheck="false" /></label>
      <label class="check"><input id="ns-worktree" type="checkbox" /> Create git worktree (isolated branch)</label>
      <div class="modal-actions">
        <button id="ns-cancel">Cancel</button>
        <button id="ns-create" class="primary">Create</button>
      </div>
      <div id="ns-error" class="error hidden"></div>
    </div>
  </div>

  <script src="vendor/xterm.js"></script>
  <script src="vendor/addon-fit.js"></script>
  <script src="app.js"></script>
</body>
</html>
