<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 460" fill="none">
  <defs>
    <radialGradient id="surface" cx="50%" cy="30%" r="90%">
      <stop offset="0%" stop-color="#1d2029"/>
      <stop offset="100%" stop-color="#12141b"/>
    </radialGradient>
    <filter id="inlay" x="-30%" y="-30%" width="160%" height="160%">
      <feOffset in="SourceAlpha" dx="0" dy="4" result="off"/>
      <feGaussianBlur in="off" stdDeviation="4" result="blur"/>
      <feComposite in="blur" in2="SourceAlpha" operator="arithmetic" k2="-1" k3="1" result="mask"/>
      <feFlood flood-color="#000000" flood-opacity="0.35"/>
      <feComposite in2="mask" operator="in" result="shadow"/>
      <feMerge><feMergeNode in="SourceGraphic"/><feMergeNode in="shadow"/></feMerge>
    </filter>
    <filter id="glint" x="-150%" y="-150%" width="400%" height="400%">
      <feGaussianBlur stdDeviation="5"/>
    </filter>
  </defs>
  <rect width="900" height="460" rx="20" fill="url(#surface)"/>
  <g transform="translate(450,154.15) scale(0.86)" fill="rgba(255,255,255,0.09)">
      <path d="M 102.00 0.00 A 102 102 0 0 1 -24.68 98.97 A 84 84 0 0 0 102.00 0.00 Z"/>
      <path d="M -51.00 88.33 A 102 102 0 0 1 -73.37 -70.86 A 84 84 0 0 0 -51.00 88.33 Z"/>
      <path d="M -51.00 -88.33 A 102 102 0 0 1 98.05 -28.12 A 84 84 0 0 0 -51.00 -88.33 Z"/>
  </g>
  <g transform="translate(450,152) scale(0.86)" fill="#c3c9d6" filter="url(#inlay)">
      <path d="M 102.00 0.00 A 102 102 0 0 1 -24.68 98.97 A 84 84 0 0 0 102.00 0.00 Z"/>
      <path d="M -51.00 88.33 A 102 102 0 0 1 -73.37 -70.86 A 84 84 0 0 0 -51.00 88.33 Z"/>
      <path d="M -51.00 -88.33 A 102 102 0 0 1 98.05 -28.12 A 84 84 0 0 0 -51.00 -88.33 Z"/>
    <circle r="18" fill="#ffffff"/>
  </g>
  <circle cx="450" cy="152" r="8.6" fill="#ffffff" opacity="0.5" filter="url(#glint)"/>
  <text x="450" y="360" text-anchor="middle" font-family="ui-monospace, 'SF Mono', Menlo, monospace"
        font-size="88" font-weight="700" fill="#c3c9d6">clash</text>
  <text x="450" y="414" text-anchor="middle" font-family="ui-monospace, 'SF Mono', Menlo, monospace"
        font-size="16" fill="#6b7284">your agents aren't gonna manage themselves</text>
</svg>
