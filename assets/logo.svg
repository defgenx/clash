<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 280" fill="none">
  <defs>
    <linearGradient id="text-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#b48cff"/>
      <stop offset="40%" stop-color="#ff8cc8"/>
      <stop offset="60%" stop-color="#ff8cc8"/>
      <stop offset="100%" stop-color="#b48cff"/>
    </linearGradient>
    <linearGradient id="ray-h" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#7a52cc" stop-opacity="0"/>
      <stop offset="50%" stop-color="#af82ff" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#7a52cc" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="ray-v" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#7a52cc" stop-opacity="0"/>
      <stop offset="50%" stop-color="#af82ff" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#7a52cc" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="ray-d1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7a52cc" stop-opacity="0"/>
      <stop offset="50%" stop-color="#9b6ee6" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#7a52cc" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="ray-d2" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#7a52cc" stop-opacity="0"/>
      <stop offset="50%" stop-color="#9b6ee6" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#7a52cc" stop-opacity="0"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glow-lg">
      <feGaussianBlur stdDeviation="8" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glow-xl">
      <feGaussianBlur stdDeviation="14" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="b"/><feMergeNode in="b"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="600" height="280" rx="16" fill="#0c0c12"/>

  <!-- Outermost shockwave ring -->
  <circle cx="300" cy="95" r="115" fill="none" stroke="#7a52cc" stroke-width="0.7" opacity="0.10"/>
  <!-- Middle shockwave ring -->
  <circle cx="300" cy="95" r="80" fill="none" stroke="#af82ff" stroke-width="1.0" opacity="0.16"/>
  <!-- Inner shockwave ring -->
  <circle cx="300" cy="95" r="48" fill="none" stroke="#c49cff" stroke-width="1.4" opacity="0.24"/>

  <!-- Energy rays — cardinal -->
  <line x1="180" y1="95" x2="420" y2="95" stroke="url(#ray-h)" stroke-width="2.2"/>
  <line x1="300" y1="0" x2="300" y2="178" stroke="url(#ray-v)" stroke-width="2.2"/>

  <!-- Energy rays — diagonal -->
  <line x1="215" y1="18" x2="385" y2="172" stroke="url(#ray-d1)" stroke-width="1.2"/>
  <line x1="385" y1="18" x2="215" y2="172" stroke="url(#ray-d2)" stroke-width="1.2"/>

  <!-- Ambient glow -->
  <ellipse cx="300" cy="95" rx="90" ry="72" fill="#af82ff" opacity="0.05" filter="url(#glow-xl)"/>

  <!-- Central explosion — layered glows from diffuse to white-hot -->
  <ellipse cx="300" cy="95" rx="50" ry="42" fill="#af82ff" opacity="0.09" filter="url(#glow-xl)"/>
  <ellipse cx="300" cy="95" rx="28" ry="22" fill="#ffb8e0" opacity="0.18" filter="url(#glow-lg)"/>
  <circle cx="300" cy="95" r="11" fill="#fff0f8" opacity="0.50" filter="url(#glow-lg)"/>
  <circle cx="300" cy="95" r="4" fill="#fff5fa" opacity="0.92" filter="url(#glow)"/>

  <!-- Scattered particles — matter born from the explosion -->
  <circle cx="258" cy="56" r="2.0" fill="#ffc8e4" filter="url(#glow)"/>
  <circle cx="348" cy="62" r="1.7" fill="#d4aaff" filter="url(#glow)"/>
  <circle cx="342" cy="124" r="1.8" fill="#ffc8e4" filter="url(#glow)"/>
  <circle cx="252" cy="122" r="1.4" fill="#d4aaff" filter="url(#glow)"/>
  <circle cx="314" cy="40" r="1.5" fill="#fff" opacity="0.80" filter="url(#glow)"/>
  <circle cx="274" cy="142" r="1.3" fill="#ffc8e4" filter="url(#glow)"/>
  <circle cx="364" cy="84" r="1.2" fill="#d4aaff" filter="url(#glow)"/>
  <circle cx="236" cy="78" r="1.1" fill="#ffc8e4" filter="url(#glow)"/>
  <circle cx="326" cy="150" r="1.0" fill="#d4aaff" opacity="0.70" filter="url(#glow)"/>
  <circle cx="280" cy="44" r="0.9" fill="#ffc8e4" opacity="0.60" filter="url(#glow)"/>
  <circle cx="356" cy="110" r="1.4" fill="#fff" opacity="0.50" filter="url(#glow)"/>
  <circle cx="244" cy="104" r="1.0" fill="#ffc8e4" opacity="0.50" filter="url(#glow)"/>

  <!-- "clash" text -->
  <text x="300" y="218" text-anchor="middle" font-family="Monaco, 'Cascadia Code', 'Fira Code', 'JetBrains Mono', monospace" font-size="52" font-weight="bold" fill="url(#text-grad)" filter="url(#glow)">clash</text>

  <!-- Tagline -->
  <text x="300" y="244" text-anchor="middle" font-family="Monaco, 'Cascadia Code', 'Fira Code', monospace" font-size="12" fill="#9b94b2">your agents aren't gonna manage themselves</text>

  <!-- Status indicators -->
  <text x="118" y="268" font-family="Monaco, 'Cascadia Code', monospace" font-size="10" fill="#f08c78" filter="url(#glow)">&#x25C9; PROMPTING</text>
  <text x="238" y="268" font-family="Monaco, 'Cascadia Code', monospace" font-size="10" fill="#8cb9f0" filter="url(#glow)">&#x25CE; THINKING</text>
  <text x="353" y="268" font-family="Monaco, 'Cascadia Code', monospace" font-size="10" fill="#78dc96" filter="url(#glow)">&#x25CF; RUNNING</text>
  <text x="458" y="268" font-family="Monaco, 'Cascadia Code', monospace" font-size="10" fill="#5f5873">&#x25CB; IDLE</text>
</svg>
