<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 200" fill="none">
  <defs>
    <linearGradient id="glow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#b48cff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#7c5cbf;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="120%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#b48cff" flood-opacity="0.3"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="600" height="200" rx="16" fill="#0d0d1a"/>

  <!-- Terminal window chrome -->
  <rect x="30" y="20" width="540" height="160" rx="10" fill="#141423" stroke="#2a2a45" stroke-width="1.5"/>

  <!-- Window dots -->
  <circle cx="55" cy="38" r="5" fill="#ff5f57"/>
  <circle cx="75" cy="38" r="5" fill="#febc2e"/>
  <circle cx="95" cy="38" r="5" fill="#28c840"/>

  <!-- Terminal title bar text -->
  <text x="300" y="42" text-anchor="middle" font-family="Monaco, 'Cascadia Code', 'Fira Code', monospace" font-size="11" fill="#5a5a6e">clash — Terminal UI</text>

  <!-- Main logo text -->
  <text x="300" y="105" text-anchor="middle" font-family="Monaco, 'Cascadia Code', 'Fira Code', monospace" font-size="56" font-weight="bold" fill="url(#glow)" filter="url(#shadow)">
    ✦ clash
  </text>

  <!-- Tagline -->
  <text x="300" y="135" text-anchor="middle" font-family="Monaco, 'Cascadia Code', 'Fira Code', monospace" font-size="14" fill="#8888aa">
    your agents aren't gonna manage themselves
  </text>

  <!-- Status indicators -->
  <text x="120" y="165" font-family="Monaco, 'Cascadia Code', 'Fira Code', monospace" font-size="11" fill="#ff9f43">◉ PROMPTING</text>
  <text x="248" y="165" font-family="Monaco, 'Cascadia Code', 'Fira Code', monospace" font-size="11" fill="#b48cff">◎ THINKING</text>
  <text x="365" y="165" font-family="Monaco, 'Cascadia Code', 'Fira Code', monospace" font-size="11" fill="#28c840">● RUNNING</text>
  <text x="472" y="165" font-family="Monaco, 'Cascadia Code', 'Fira Code', monospace" font-size="11" fill="#5a5a6e">○ IDLE</text>
</svg>
