      <g transform="rotate(120) translate(88,0) rotate(60)"><path d="M 58 -58 L 0 0 L 58 58" fill="none" stroke="#b9c0cf" stroke-width="28" stroke-linecap="round" stroke-linejoin="round"/></g>
      <g transform="rotate(240) translate(88,0) rotate(60)"><path d="M 58 -58 L 0 0 L 58 58" fill="none" stroke="#b9c0cf" stroke-width="28" stroke-linecap="round" stroke-linejoin="round"/></g>
