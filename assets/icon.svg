<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" fill="none">
  <!-- clash icon — the prompt, debossed: cut into the surface.
       Light from above: dark inner shadow at the top of the cut,
       a hairline of light catching the lower edge. -->
  <defs>
    <radialGradient id="surface" cx="50%" cy="30%" r="90%">
      <stop offset="0%" stop-color="#1d2029"/>
      <stop offset="100%" stop-color="#12141b"/>
    </radialGradient>
    <filter id="deboss" x="-30%" y="-30%" width="160%" height="160%">
      <feOffset in="SourceAlpha" dx="0" dy="5" result="off"/>
      <feGaussianBlur in="off" stdDeviation="5" result="blur"/>
      <feComposite in="blur" in2="SourceAlpha" operator="arithmetic" k2="-1" k3="1" result="mask"/>
      <feFlood flood-color="#000000" flood-opacity="0.6"/>
      <feComposite in2="mask" operator="in" result="shadow"/>
      <feMerge>
        <feMergeNode in="SourceGraphic"/>
        <feMergeNode in="shadow"/>
      </feMerge>
    </filter>
    <filter id="glint" x="-150%" y="-150%" width="400%" height="400%">
      <feGaussianBlur stdDeviation="4"/>
    </filter>
  </defs>

  <rect x="28" y="28" width="456" height="456" rx="103" fill="url(#surface)"/>

  <!-- light catching the lower edge of the cut -->
  <g transform="translate(0, 2.5)">
      <circle cx="250" cy="246" r="118" fill="none" stroke="rgba(255,255,255,0.08)" stroke-width="5"/>
      <path d="M 170 166 L 250 246 L 170 326" fill="none" stroke="rgba(255,255,255,0.08)" stroke-width="40"
            stroke-linecap="round" stroke-linejoin="round"/>
      <rect x="290" y="306" width="78" height="22" rx="8" fill="rgba(255,255,255,0.08)"/>
  </g>
  <!-- the cut itself -->
  <g filter="url(#deboss)">
      <circle cx="250" cy="246" r="118" fill="none" stroke="#0c0e14" stroke-width="5"/>
      <path d="M 170 166 L 250 246 L 170 326" fill="none" stroke="#0c0e14" stroke-width="40"
            stroke-linecap="round" stroke-linejoin="round"/>
      <rect x="290" y="306" width="78" height="22" rx="8" fill="#0c0e14"/>
  </g>

  <!-- singularity glint at the prompt tip -->
  <circle cx="250" cy="246" r="9" fill="#ffffff" opacity="0.10" filter="url(#glint)"/>
  <circle cx="250" cy="246" r="3.5" fill="#ffffff" opacity="0.22"/>
</svg>
