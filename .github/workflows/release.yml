name: Release

on:
  push:
    branches: [main]

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  version:
    name: Determine Version
    runs-on: ubuntu-latest
    outputs:
      new_version: ${{ steps.tag.outputs.new_version }}
      new_tag: ${{ steps.tag.outputs.new_tag }}
      bump: ${{ steps.tag.outputs.part }}
      skipped: ${{ steps.check.outputs.skipped }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # Skip if the push is a version bump commit from this workflow
      - name: Check if version bump commit
        id: check
        run: |
          MSG=$(git log -1 --pretty=%s)
          if echo "$MSG" | grep -qE '^chore\(release\): v[0-9]'; then
            echo "skipped=true" >> $GITHUB_OUTPUT
            echo "Skipping release — this is a version bump commit"
          else
            echo "skipped=false" >> $GITHUB_OUTPUT
          fi

      - name: Determine version bump from commits
        if: steps.check.outputs.skipped == 'false'
        id: tag
        uses: mathieudutour/github-tag-action@v6.2
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          default_bump: false
          dry_run: true
          tag_prefix: v

  bump:
    name: Bump Cargo.toml & Tag
    needs: version
    if: needs.version.outputs.skipped == 'false' && needs.version.outputs.new_version != ''
    runs-on: ubuntu-latest
    outputs:
      version: ${{ needs.version.outputs.new_version }}
      tag: ${{ needs.version.outputs.new_tag }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: dtolnay/rust-toolchain@stable

      - name: Update Cargo.toml version
        run: |
          VERSION="${{ needs.version.outputs.new_version }}"
          echo "Bumping to $VERSION"
          sed -i 's/^version = ".*"/version = "'"$VERSION"'"/' Cargo.toml
          grep '^version' Cargo.toml

      - name: Regenerate Cargo.lock
        run: cargo check

      - name: Commit and tag
        run: |
          VERSION="${{ needs.version.outputs.new_version }}"
          TAG="${{ needs.version.outputs.new_tag }}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Cargo.toml Cargo.lock
          git commit -m "chore(release): v${VERSION}"
          git tag -a "$TAG" -m "Release $TAG"
          git push origin main
          git push origin "$TAG"

  build:
    name: Build ${{ matrix.target }}
    needs: bump
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            artifact: clash
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            artifact: clash
          - target: x86_64-apple-darwin
            os: macos-latest
            artifact: clash
          - target: aarch64-apple-darwin
            os: macos-latest
            artifact: clash

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.bump.outputs.tag }}

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross-compilation tools
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu

      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Build
        run: |
          if [ "${{ matrix.target }}" = "aarch64-unknown-linux-gnu" ]; then
            export CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER=aarch64-linux-gnu-gcc
          fi
          cargo build --release --target ${{ matrix.target }}

      - name: Codesign (macOS)
        if: runner.os == 'macOS'
        run: codesign --force --sign - target/${{ matrix.target }}/release/${{ matrix.artifact }}

      - name: Package
        run: |
          cd target/${{ matrix.target }}/release
          tar czf ../../../clash-${{ matrix.target }}.tar.gz ${{ matrix.artifact }}

      - uses: actions/upload-artifact@v4
        with:
          name: clash-${{ matrix.target }}
          path: clash-${{ matrix.target }}.tar.gz

  release:
    name: Create Release
    needs: [bump, build]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ needs.bump.outputs.tag }}

      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Generate SHA256 checksums
        run: |
          cd artifacts
          sha256sum *.tar.gz > SHA256SUMS.txt
          cat SHA256SUMS.txt

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.bump.outputs.tag }}
          name: ${{ needs.bump.outputs.tag }}
          generate_release_notes: true
          files: |
            artifacts/*.tar.gz
            artifacts/SHA256SUMS.txt
